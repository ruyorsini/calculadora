<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ISEE</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{background:#fff;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.2);width:100%;max-width:600px}
        header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:40px 20px;text-align:center}
        header h1{font-size:2.5em;margin-bottom:10px}
        header p{font-size:1.1em;opacity:0.9}
        main{padding:40px}
        .form-section{margin-bottom:30px}
        .form-section h2{font-size:1.3em;color:#333;margin-bottom:15px;border-bottom:2px solid #667eea;padding-bottom:10px}
        .form-group{margin-bottom:20px}
        label{display:block;margin-bottom:8px;color:#555;font-weight:500;font-size:0.95em}
        input[type="number"]{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:6px;font-size:1em}
        input[type="number"]:focus{outline:0;border-color:#667eea;box-shadow:0 0 5px rgba(102,126,234,0.3)}
        .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:0;border-radius:6px;font-size:1.1em;font-weight:600;cursor:pointer}
        .submit-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(102,126,234,0.4)}
        .result-section{background:#f8f9ff;border-left:4px solid #667eea;padding:20px;border-radius:6px;margin-top:30px}
        .result-section.hidden{display:none}
        .result-value{background:#fff;padding:20px;border-radius:6px;margin-bottom:20px;text-align:center;border:2px solid #667eea}
        .isee-value{font-size:2.2em;color:#667eea;font-weight:bold}
        .result-details{background:#fff;padding:15px;border-radius:6px;margin-bottom:20px}
        .result-details span{color:#667eea;font-weight:600}
        .reset-btn{width:100%;padding:12px;background:#667eea;color:#fff;border:0;border-radius:6px;cursor:pointer}
        .reset-btn:hover{background:#764ba2}
        footer{background:#f5f5f5;padding:20px;text-align:center;border-top:1px solid #e0e0e0;color:#666;font-size:0.9em}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Calculadora ISEE</h1>
            <p>Calcule seu Indicador de Situação Econômica Equivalente</p>
        </header>
        <main>
            <form id="iseeForm">
                <div class="form-section">
                    <h2>Dados Familiares</h2>
                    <div class="form-group">
                        <label for="familyMembers">Número de Membros da Família:</label>
                        <input type="number" id="familyMembers" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="familyIncome">Renda Familiar Total (€):</label>
                        <input type="number" id="familyIncome" min="0" step="0.01" required>
                    </div>
                </div>
                <div class="form-section">
                    <h2>Patrimônio</h2>
                    <div class="form-group">
                        <label for="financialAssets">Patrimônio Mobiliário (€):</label>
                        <input type="number" id="financialAssets" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="realEstateAssets">Patrimônio Imobiliário (€):</label>
                        <input type="number" id="realEstateAssets" min="0" step="0.01" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Calcular ISEE</button>
            </form>
            <div id="result" class="result-section hidden">
                <h2>Resultado</h2>
                <div class="result-value">
                    <p>Seu ISEE Estimado:</p>
                    <p id="iseeValue" class="isee-value">-</p>
                </div>
                <div class="result-details">
                    <p><strong>Renda Considerada:</strong> <span id="incomeDetail">-</span></p>
                    <p><strong>Patrimônio Considerado:</strong> <span id="assetDetail">-</span></p>
                    <p><strong>Escala de Equivalência:</strong> <span id="scaleDetail">-</span></p>
                </div>
                <button type="button" class="reset-btn" onclick="resetForm()">Novo Cálculo</button>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 Calculadora ISEE</p>
        </footer>
    </div>
    <script>
        document.getElementById('iseeForm').addEventListener('submit',function(e){
            e.preventDefault();
            const fam=parseInt(document.getElementById('familyMembers').value);
            const inc=parseFloat(document.getElementById('familyIncome').value);
            const fin=parseFloat(document.getElementById('financialAssets').value);
            const real=parseFloat(document.getElementById('realEstateAssets').value);
            const scale=1+(fam-1)*0.57;
            const assets=(fin*0.2)+(real*0.2);
            const ise=inc+assets;
            const isee=ise/scale;
            document.getElementById('iseeValue').textContent=`€ ${isee.toFixed(2)}`;
            document.getElementById('incomeDetail').textContent=`€ ${inc.toFixed(2)}`;
            document.getElementById('assetDetail').textContent=`€ ${assets.toFixed(2)}`;
            document.getElementById('scaleDetail').textContent=scale.toFixed(2);
            document.getElementById('result').classList.remove('hidden');
            setTimeout(function(){document.getElementById('result').scrollIntoView({behavior:'smooth'})},100);
        });
        function resetForm(){
            document.getElementById('iseeForm').reset();
            document.getElementById('result').classList.add('hidden');
            document.getElementById('familyMembers').value='1';
            window.scrollTo({top:0,behavior:'smooth'});
        }
    </script>
</body>
</html>
